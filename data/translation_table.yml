  Python: |
    import numpy as np
    import pandas as pd
    from skimage import measure
    from skimage.measure import regionprops_table
    from skimage.draw import disk
    import matplotlib.pyplot as plt

    # Definierte Features wie in Galaxy Workflow
    features = [
        'label',
        'area',
        'perimeter',
        'eccentricity',
        'major_axis_length',
        'minor_axis_length',
        'max_intensity',
        'mean_intensity'
    ]

    # Feature-Extraktion mit skimage
    props = regionprops_table(input_label, intensity_image=input_raw, properties=features)
    measurement_table = pd.DataFrame(props)

